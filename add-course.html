<main>
  <section class="add-courses">
   <legend>
     <h2>Add New Course</h2>
     <p>Fill in the details below to track a new learning adventure.</p> 
   </legend>
   <fieldset>
     <form>
       <div>
         <label for="course-name"> Course Name</label>
         <input id="course-name" type="text" required placeholder="Ai,java script.......">
       </div>
        <div>
         <label for="Instructor"> Instructor</label>
         <input id="Instructor" type="text" required placeholder=" Dr, eng........">
       </div>
        <div>
         <label for="Credit-Hours"> Credit Hours</label>
         <input id="Credit-Hours" type="text" required placeholder="2h,5h.........">
       </div>
        <div>
         <label for="Notes">Notes </label>
         <input id="Notes" type="text" required placeholder="Completed,In Progress..........">
       </div>
       <input type="submit" value="Save Course">
     </form>
   </fieldset>
  </section>
</main>
